name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe the problem you're solving and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: A clear description of the limitation or pain point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried.

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Core engine / storage
        - Redis compatibility
        - Mnemo (agent memory)
        - Forge (WASM functions)
        - Concord (CRDTs)
        - Chronicle (branchable state)
        - Lucidity (audit log)
        - Pangea (CXL memory)
        - Replication / clustering
        - Observability / metrics
        - SDKs
        - Documentation
        - CI / tooling
        - Other
